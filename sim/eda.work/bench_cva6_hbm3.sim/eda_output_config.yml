command_name: sim
config:
  DEFAULT_HANDLERS:
    build: opencos.commands.CommandBuild
    elab: opencos.commands.CommandElab
    sim: opencos.commands.CommandSim
    lint: opencos.commands.CommandLint
    synth: opencos.commands.CommandSynth
    pnr: opencos.commands.CommandPnr
    proj: opencos.commands.CommandProj
    open: opencos.commands.CommandOpen
    lec: opencos.commands.CommandLec
    coverage: opencos.commands.CommandCoverage
    flist: opencos.commands.CommandFList
    multi: opencos.commands.CommandMulti
    sweep: opencos.commands.CommandSweep
    tools-multi: opencos.commands.CommandToolsMulti
    export: opencos.commands.CommandExport
    shell: opencos.commands.CommandShell
    targets: opencos.commands.CommandTargets
    upload: opencos.commands.CommandUpload
    waves: opencos.commands.CommandWaves
    deps-help: opencos.commands.CommandDepsHelp
  DEFAULT_HANDLERS_HELP:
    build: Build for a board, creating a project and running build flow.
    coverage: Merge or report coverage databases from multiple test runs (tool dependent)
    elab: Elaborates a DEPS target (lint + elab, tool specific).
    export: Export files related to a target, tool independent.
    flist: Create dependency from a DEPS target.
    lec: Run equivalence on two designs.
    lint: Syntax check, lint a DEPS target
    multi: Run multiple DEPS targets, serially or in parallel.
    open: Opens a project.
    pnr: Place and Route, if supported for --tool. Some tools fold this into "synth".
    proj: Create a project from a DEPS target for GUI sim/waves/debug.
    shell: Runs only commands for DEPS target (like sim or elab, but stops prior to
      tool).
    sim: Simulates a DEPS target.
    synth: Synthesizes a DEPS target.
    sweep: Sweep one or more arguments across a range, serially or in parallel.
    targets: List all possible targets given glob path.
    tools-multi: Same as 'multi' but run on all available tools, or specfied using
      --tools.
    upload: Uploads a finished design into hardware.
    waves: Opens waveform from prior simulation.
    deps-help: Provide help about DEPS markup files, or schema using --verbose or
      --help.
    help: This help (without args), or i.e. "eda sim --help [--tool=TOOL]" for specific
      help.
  defines: {}
  dep_command_enables:
    shell: true
    work_dir_add_srcs: true
    peakrdl: true
    var_subst_args: true
    var_subst_os_env: true
    tee: true
  dep_tags_enables:
    with-tools: true
    with-args: true
    with-commands: true
    args: true
    replace-config-tools: true
    additive-config-tools: true
  deps_markup_supported: true
  deps_subprocess_shell: true
  bare_plusarg_supported: true
  deps_expandvars_enable: true
  show_tool_versions: true
  dep_sub: []
  vars: {}
  use_max_threads: false
  file_extensions:
    verilog:
    - .v
    systemverilog:
    - .sv
    vhdl:
    - .vhd
    - .vhdl
    cpp:
    - .cpp
    - .cc
    synth_constraints:
    - .sdc
    - .xdc
    dotf:
    - .f
    - .vc
    python:
    - .py
    makefile:
    - .mk
    inferred_top:
    - .v
    - .sv
    - .vhd
    - .vhdl
  command_determines_tool:
  - waves
  - upload
  command_tool_is_optional:
  - shell
  - flist
  - export
  - targets
  - deps-help
  command_has_subcommands:
  - multi
  - tools-multi
  - sweep
  auto_tools_order:
    lint:
    - slang
    - surelog
    - verilator
    - vivado
    - modelsim_ase
    - questa_fse
    - questa_fe
    - questa
    - riviera
    - iverilog
    - invio
    elab:
    - slang
    - surelog
    - verilator
    - vivado
    - modelsim_ase
    - questa_fse
    - questa_fe
    - questa
    - slang_yosys
    - riviera
    - iverilog
    - invio
    - invio_yosys
    sim:
    - verilator
    - vivado
    - modelsim_ase
    - questa_fse
    - questa_fe
    - questa
    - riviera
    - iverilog
    synth:
    - slang_yosys
    - vivado
    - quartus
    - tabbycad_yosys
    - invio_yosys
    - yosys
    proj:
    - vivado
    - quartus
    pnr:
    - openroad
    build:
    - vivado
    - quartus
    open:
    - vivado
    - quartus
    lec:
    - slang_yosys
    - yosys
    waves:
    - cognichip-beta
    - cognichip
    - vaporview
    - gtkwave
    - surfer
    - vivado
    - questa
    - questa_fe
    - questa_fse
    - modelsim_ase
    - riviera
    upload:
    - vivado
    - quartus
  tools:
    cognichip:
      macos-app-name: Cognichip
      macos-prefer-exes:
      - cognichip
      - code
      handlers:
        waves: opencos.tools.cognichip.CommandWavesCognichip
      waves-file-ext:
      - .vcd
      - .fst
    cognichip-beta:
      macos-app-name: Cognichip Beta
      macos-prefer-exes:
