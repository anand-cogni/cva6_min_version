      - code
      handlers:
        waves: opencos.tools.cognichip.CommandWavesCognichipBeta
      waves-file-ext:
      - .vcd
      - .fst
    vaporview:
      exe: code
      macos-app-name: Visual Studio Code
      requires-vscode-extension:
      - lramseyer.vaporview
      handlers:
        waves: opencos.tools.vaporview.CommandWavesVaporview
      waves-file-ext:
