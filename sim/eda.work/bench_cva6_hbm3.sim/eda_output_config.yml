      - .fst
    surfer:
      exe: code
      macos-app-name: Visual Studio Code
      requires-vscode-extension:
      - surfer-project.surfer
      handlers:
        waves: opencos.tools.surfer.CommandWavesSurfer
      waves-file-ext:
      - .vcd
      - .fst
    gtkwave:
      handlers:
        waves: opencos.tools.gtkwave.CommandWavesGtkwave
      waves-file-ext:
      - .vcd
      - .fst
    slang:
      requires-cmd:
      - slang --version
      handlers:
        lint: opencos.tools.slang.CommandLintSlang
        elab: opencos.tools.slang.CommandElabSlang
      defines:
        OC_TOOL_SLANG: null
        SLANG: 1
      log-warning-strings:
      - ': warning: '
      log-bad-strings:
      - 'Build failed: '
      log-must-strings:
      - 'Build succeeded: '
      - 0 warnings
      compile-args: '--single-unit

        --timescale=1ns/1ns

        --allow-dup-initial-drivers

        -Wno-missing-top

        '
      compile-waivers: []
    verilator:
      docker-support: true
      docker-default-image: verilator/verilator:latest
      docker-env:
        verilator/verilator:
          CCACHE_DIR: /tmp/ccache
      handlers:
        lint: opencos.tools.verilator.VerilatorLint
        elab: opencos.tools.verilator.VerilatorElab
        sim: opencos.tools.verilator.VerilatorSim
      defines:
        SIMULATION: 1
      log-warning-strings:
      - '%Warning'
      log-bad-strings:
      - '%Error'
      - '%Fatal'
      log-must-strings:
      - 'R e p o r t: Verilator'
      compile-args: '--timing

        --assert

        --autoflush

        -sv

        '
      compile-coverage-args: '--coverage

        '
      compile-waves-args: '--trace-structs

        --trace-params

        '
      compile-waivers:
      - CASEINCOMPLETE
      - REALCVT
      - SELRANGE
      - TIMESCALEMOD
      - UNSIGNED
      - WIDTH
      simulate-args: ''
      coverage-args: '--annotate logs/annotated

