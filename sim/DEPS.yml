# ============================================================================
# DEPS Configuration for CVA6 + HBM3 Integration System
# ============================================================================
# Description:
#   Dependency configuration for CVA6 RISC-V processor with HBM3 memory controller
#   Contains targets for individual modules and complete system testbench
#
# Directory Structure:
#   src/                    - CVA6 RTL source files
#   tb/                     - Testbench files
#   sim/                    - Simulation configuration (this file)
#   Vspark_ip_core/LS_HBM3/ - HBM3 controller IP core
#   constraints/            - FPGA constraints
#   doc/                    - Documentation
# ============================================================================

# ============================================================================
# HBM3 Sub-Module Targets
# ============================================================================

# APB Slave (Configuration Interface)
apb_slave_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/apb_slave/src/apb_slave.sv
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/apb_slave/src/apb_rtl_defines.svh
  top: apb_slave

# AXI Slave Interface
axi_slave_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/axi5_slave/src/axi_slave_interface.sv
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/axi5_slave/src/axi_rtl_defines.svh
  top: axi_slave_interface

# Command Manager
cmd_manager_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/cmd_manager/src/command_manager.sv
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/cmd_manager/src/cmdmgr_rtl_defines.svh
  top: command_manager

# Refresh Controller
refresh_ctrl_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/refresh_controller/src/refresh_ctrl.sv
  top: refresh_ctrl
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/refresh_controller/src

# Command Processor
cmd_processor_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/command_processor/src/command_processor.sv
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/command_processor/src/cmdpr_rtl_defines.svh
  top: command_processor

# DFI Interface
dfi_interface_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src/dfi_rtl_defines.svh
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src/hbm3_dfi_interface.sv
  top: hbm3_dfi_interface
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src

# HBM3 PHY
hbm3_phy_rtl:
  deps:
    - ../Vspark_ip_core/LS_HBM3/testbench/hbm3_sv_core_2.0/src/hbm3_phy/src/hbm3_phy.sv
  top: hbm3_phy
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/testbench/hbm3_sv_core_2.0/src/hbm3_phy/src

# ============================================================================
# HBM3 Controller Top Integration
# ============================================================================
hbm3_controller:
  deps:
    - apb_slave_rtl
    - axi_slave_rtl
    - cmd_manager_rtl
    - refresh_ctrl_rtl
    - cmd_processor_rtl
    - dfi_interface_rtl
    - hbm3_phy_rtl
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/integration/src/hbm3_controller_top.sv
  top: hbm3_controller_top
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/refresh_controller/src
    - ../Vspark_ip_core/LS_HBM3/testbench/hbm3_sv_core_2.0/src/hbm3_phy/src

# ============================================================================
# CVA6 Individual Module Targets
# ============================================================================

# Boot ROM module
boot_rom:
  deps:
    - ../src/cva6_boot_rom.v

# Data RAM module
data_ram:
  deps:
    - ../src/cva6_data_ram.v

# RISC-V processor core
riscv_core:
  deps:
    - ../src/cva6_min_core.v
  top: simple_riscv_core

# UART Transmitter
uart_tx:
  deps:
    - ../src/simple_uart_tx.v
  top: simple_uart_tx

# ============================================================================
# CVA6 + HBM3 Integration Target
# ============================================================================

# Top-level CVA6 system with HBM3 (DUT only)
cva6_hbm3_system:
  deps:
    - ../src/cva6_boot_rom.v
    - ../src/cva6_data_ram.v
    - ../src/cva6_min_core.v
    - ../src/simple_uart_tx.v
    - hbm3_controller
    - ../src/cva6_minimal_top.v
  top: cva6_minimal_top
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src

# ============================================================================
# Complete Testbench Targets
# ============================================================================

# Full CVA6 + HBM3 system testbench - Basic LED blink test
bench_cva6_hbm3:
  deps:
    - ../src/cva6_boot_rom.v
    - ../src/cva6_data_ram.v
    - ../src/cva6_min_core.v
    - ../src/simple_uart_tx.v
    - hbm3_controller
    - ../src/cva6_minimal_top.v
    - ../tb/tb_cva6_minimal_top.v
  top: tb_cva6_minimal_top
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/refresh_controller/src
    - ../Vspark_ip_core/LS_HBM3/testbench/hbm3_sv_core_2.0/src/hbm3_phy/src

# HBM3 Memory Test - Direct memory read/write verification
bench_hbm3_memtest:
  deps:
    - ../src/cva6_boot_rom.v
    - ../src/cva6_data_ram.v
    - ../src/cva6_min_core.v
    - ../src/simple_uart_tx.v
    - hbm3_controller
    - ../src/cva6_minimal_top.v
    - ../tb/tb_hbm3_memtest.v
  top: tb_hbm3_memtest
  incdirs:
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/dfi/src
    - ../Vspark_ip_core/LS_HBM3/rtl_cores/sub_modules/refresh_controller/src
    - ../Vspark_ip_core/LS_HBM3/testbench/hbm3_sv_core_2.0/src/hbm3_phy/src

# ============================================================================
# Legacy Targets (for backwards compatibility)
# ============================================================================

# Original CVA6 system without HBM3
cva6_system:
  deps:
    - ../src/cva6_boot_rom.v
    - ../src/cva6_data_ram.v
    - ../src/cva6_min_core.v
    - ../src/cva6_minimal_top.v
  top: cva6_minimal_top

# Original testbench target name
bench_cva6_minimal:
  deps:
    - bench_cva6_hbm3
  top: tb_cva6_minimal_top
